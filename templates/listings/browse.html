{% extends "base.html" %}
{% block content %}
{% import "listings/listing.html" as listing_macro %}
<h3>Listings / Browse</h3>
<div class="col-md-4 mt-5"> 
    <form method="GET">
        <div class="d-flex flex-column gap-1 mb-3">
            <label class="form-label">Search</label>
            <input type="text" name="q" class="form-control me-3 required" value="{{ request.args.get('q', '') }}">
            <select name="category" class="form-select" style="max-width: 200px;">
                <option value="">All Categories</option>
                {% for cat in categories %}
                    <option value="{{ cat['category_name'] }}" 
                        {% if request.args.get('category') == cat['Category'] %}selected{% endif %}>
                        {{ cat['Category'] }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <button class="btn btn-primary w-100">Search</button>
    </form>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for listing in listings %}
        {{ listing_macro.render_listing(listing) }}
    {% endfor %}
</div>
{% endblock %}
