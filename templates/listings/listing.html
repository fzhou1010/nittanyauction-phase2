{% macro render_listing(item) %}
<div class="col">
    <div class="card h-100 shadow-sm" style="min-height: 13rem;">
        <div class="card-body p-2 d-flex flex-column" style="font-size: 0.85rem;">
            <div class="text-muted text-truncate" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.03em;">{{ item.Category or '—' }}</div>
            <div class="fw-semibold text-truncate" style="font-size: 0.95rem;" title="{{ item.Auction_Title }}">{{ item.Auction_Title or 'Untitled' }}</div>
            <div class="text-muted text-truncate">{{ item.Product_Name or '—' }}</div>
            <div class="text-muted text-truncate" style="font-size: 0.75rem;">{{ item.Seller_Email }}</div>
            <div class="text-muted" style="font-size: 0.75rem;">Qty: {{ item.Quantity }}</div>
            <div class="mt-2 mb-2">
                {% if item.Current_Bid %}
                <span class="fw-semibold">${{ item.Current_Bid }}</span>
                {% else %}
                <span class="text-muted">No bids yet</span>
                {% endif %}
            </div>
            <a href="/listing/{{ item.Seller_Email }}/{{ item.Listing_ID }}" class="btn btn-primary btn-sm mt-auto">View</a>
        </div>
    </div>
</div>
{% endmacro %}
