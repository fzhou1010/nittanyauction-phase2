{% macro render_listing(item) %}
<div class="col-md-4 mt-5">
    <div class="card">
        <div class="card-body">
            <h6 class="card-subtitle mb-2 text-muted">{{ item.Category }}</h6>
            <h2 class="card-title">{{ item.Auction_Title }}</h2>
            <h3 class="card-subtitle mb-2 text-muted">{{ item.Product_Name }}</h3>
            <h6 class="card-subtitle mb-2 text-muted">Seller: {{ item.Seller_Email }}</h6>
            <h6 class="card-subtitle mb-2 text-muted">Qty: {{ item.Quantity }}</h6>
            <!-- TODO: Figure out pricing formatting with last 0-->
            {% if item.current_bid %}
            <p class="card-text">Current Bid: ${{ item.Current_Bid }}0</p>
            {% else %}
            <p class="card-text">No Bids Yet</p>
            {% endif %}
            <a href="/listing/{{ item.Seller_Email }}/{{ item.Listing_ID }}" class="btn btn-primary">View Details</a>
        </div>
    </div>
</div>
{% endmacro %}
