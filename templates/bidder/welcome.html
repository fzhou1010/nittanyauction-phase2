{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 120px); padding-bottom: 12vh;">
    <div class="col-md-6 text-center">
        <h2>Welcome, Buyer!</h2>
        <p>You are logged in as <strong>{{ session['email'] }}</strong></p>
        <div class="mt-4">
            <a href="{{ url_for('listings.browse') }}" class="btn btn-primary me-2">Browse Listings</a>
            <a href="{{ url_for('bidder.auction_history') }}" class="btn btn-outline-primary me-2">Auction History</a>
            <a href="{{ url_for('bidder.shopping_cart') }}" class="btn btn-outline-primary">Shopping Cart</a>
        </div>
        {% if 'seller' not in session.get('available_roles', []) %}
        <div class="mt-3">
            <a href="{{ url_for('auth.profile') }}?tab=support" class="btn btn-sm btn-link">
                Want to sell items? Apply to become a seller
            </a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
