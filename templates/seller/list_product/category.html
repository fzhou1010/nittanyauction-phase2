{% extends "base.html" %}
{% block title %}List a Product{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <!-- Progress bar -->
        <div class="d-flex justify-content-between mb-2">
            <small><strong>Step 1 of 4</strong></small>
        </div>
        <div class="progress mb-4" style="height: 8px;">
            <div class="progress-bar" style="width: 25%"></div>
        </div>

        <div class="card">
            <div class="card-body">
                <h3 class="card-title mb-3">What product do you want to list to NittanyAuction?</h3>
                <p class="text-muted">Pick the category that best fits your product.</p>

                <form method="POST">
                    <div class="mb-3">
                        <h4 class="form-label my-3">Category</h4>
                        <select name="category" class="form-select" required>
                            <!-- iteratively get all fo the categories and list it as a select option -->
                            <option value="">Select a category</option>
                            {% for category in categories %}
                            <option value="{{ category['category_name'] }}">{{ category['category_name'] }}</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Unable to find category befitting?
                            <a href="{{url_for('seller.request_category')}}">Request a one here</a>
                        </small>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('seller.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Next</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
